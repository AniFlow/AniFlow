<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SigmaDev - Anime Details</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            text-decoration: none;


            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0f0e1a;
            font-family: 'Rajdhani', sans-serif;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 30px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid #0f0e1a;
            z-index: 1000;
        }

        .logo {
            font-family: 'Bebas Neue', cursive;
            font-size: 26px;
            letter-spacing: 3px;
            color: #ee0979;
            text-decoration: none;
            text-shadow: 0 0 10px rgba(238, 9, 121, 0.5);
            font-family: cursive;
            text-decoration-style: wavy;
            text-decoration-line: underline;


        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #ee0979;
        }

        /* HERO BANNER */
        .hero-banner {
            margin-top: 57px;
            width: 100%;
            height: 450px;
            position: relative;
            overflow: hidden;
        }

        .hero-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.45);
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom,
                    transparent 0%,
                    rgba(15, 14, 26, 0.5) 60%,
                    rgba(15, 14, 26, 1) 100%);
        }

        .hero-title {
            position: absolute;
            bottom: 30px;
            left: 40px;
        }

        .hero-title h1 {
            font-family: 'Bebas Neue', cursive;
            font-size: 4rem;
            letter-spacing: 5px;
            text-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }

        .hero-title .badges {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .badge-quality {
            background: rgba(238, 9, 121, 0.9);
            color: white;
        }

        .badge-genre {
            background: rgba(123, 47, 247, 0.7);
            border: 1px solid rgba(123, 47, 247, 0.8);
            color: white;
        }

        /* MAIN CONTENT */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 30px;
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px 80px;
        }

        /* BACK BUTTON */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            transition: color 0.3s;
            cursor: pointer;
            background: none;
            border: none;
        }

        .back-btn:hover {
            color: #ee0979;
        }

        /* STATS BAR */
        .stats-bar {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            padding: 20px 25px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            margin-bottom: 25px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-item i {
            color: #ee0979;
            font-size: 0.9rem;
        }

        .stat-item span {
            font-size: 0.95rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.85);
        }

        /* DESC CARD */
        .desc-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .desc-card h2 {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.5rem;
            letter-spacing: 3px;
            color: #ee0979;
            margin-bottom: 12px;
        }

        .desc-card>p {
            font-size: 1rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.9;
        }

        /* ========================
           POSTER PARTS CARDS
        ======================== */
        .parts-poster-grid {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 15px;
        }

        .part-poster-card {
            position: relative;
            height: 320px;
            width: 200px;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            text-decoration: none;
            color: white;
            flex-shrink: 0;
        }

        .part-poster-card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow:
                0 25px 60px rgba(0, 0, 0, 0.6),
                -3px 0 20px rgba(255, 255, 255, 0.2),
                3px 0 20px rgba(255, 255, 255, 0.2);
        }

        /* Shimmer effect */
        .part-poster-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 55%;
            height: 100%;
            background: linear-gradient(105deg,
                    transparent 20%,
                    rgba(255, 255, 255, 0.06) 40%,
                    rgba(255, 255, 255, 0.12) 50%,
                    rgba(255, 255, 255, 0.06) 60%,
                    transparent 80%);
            transform: skewX(-10deg);
            transition: left 0.7s ease;
            z-index: 6;
            pointer-events: none;
        }

        .part-poster-card:hover::after {
            left: 160%;
        }

        .part-poster-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0);
            transition: border-color 0.4s ease;
            z-index: 7;
            pointer-events: none;
        }

        .part-poster-card:hover::before {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .part-poster-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease, filter 0.4s ease;
            filter: brightness(0.85);
        }

        .part-poster-card:hover .part-poster-img {
            transform: scale(1.08);
            filter: brightness(1.05);
        }

        /* Quality badge top right */
        .part-poster-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(238, 9, 121, 0.95);
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            z-index: 5;
            box-shadow: 0 0 12px rgba(238, 9, 121, 0.5);
        }

        /* Overlay bottom */
        .part-poster-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65%;
            background: linear-gradient(to top,
                    rgba(8, 0, 25, 0.98) 0%,
                    rgba(8, 0, 25, 0.85) 50%,
                    rgba(8, 0, 25, 0.3) 80%,
                    transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 14px;
            transition: height 0.4s ease;
            z-index: 5;
        }

        .part-poster-card:hover .part-poster-overlay {
            height: 78%;
        }

        .part-poster-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            transform: translateY(4px);
            transition: transform 0.4s ease;
        }

        .part-poster-card:hover .part-poster-info {
            transform: translateY(0);
        }

        .part-poster-info h3 {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: white;
            line-height: 1.1;
        }

        .part-poster-stars {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .part-poster-stars .s {
            color: #ffd700;
            font-size: 0.72rem;
            letter-spacing: 1px;
        }

        .part-poster-stars .n {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.75rem;
            font-weight: 700;
        }

        .part-poster-info p {
            font-size: 0.72rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .part-poster-info p i {
            color: #ee0979;
            font-size: 0.65rem;
            width: 12px;
        }

        /* Blank placeholder card */
        .part-poster-card.blank {
            opacity: 0.35;
            cursor: default;
        }

        .part-poster-card.blank:hover {
            transform: none;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }

        .blank-bg {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
        }

        .blank-bg i {
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.2);
        }

        .blank-bg span {
            font-family: 'Bebas Neue', cursive;
            font-size: 1rem;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.3);
        }

        /* RIGHT DOWNLOAD CARD */
        .download-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(238, 9, 121, 0.3);
            border-radius: 16px;
            padding: 25px;
            position: sticky;
            top: 80px;
        }

        .anime-poster {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 18px;
        }

        .download-card h3 {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.6rem;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        .rating-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 18px;
        }

        .stars {
            color: #ffd700;
            font-size: 0.9rem;
        }

        .rating-num {
            font-size: 0.9rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
        }

        .divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            margin: 15px 0;
        }

        .parts-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 12px;
        }

        .parts-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .part-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .part-btn:hover {
            background: rgba(238, 9, 121, 0.2);
            border-color: rgba(238, 9, 121, 0.6);
            transform: translateX(4px);
        }

        .part-btn i {
            color: #ee0979;
        }

        /* SINGLE DOWNLOAD */
        .single-download {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ee0979, #7b2ff7);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s;
            animation: pulse 2s infinite;
        }

        .single-download:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(238, 9, 121, 0.5);
            animation: none;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(238, 9, 121, 0.5);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(238, 9, 121, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(238, 9, 121, 0);
            }
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .hero-banner {
                height: 280px;
            }

            .hero-title h1 {
                font-size: 2.5rem;
            }

            .hero-title {
                left: 20px;
            }

            .right-side {
                order: -1;
            }

            .part-poster-card {
                width: calc(50% - 10px);
                height: 260px;
            }
        }


        .cono-2 {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 37px;
            padding: 10px 35px 40px;
        }



        .wiget-type-2 {
            position: relative;
            height: 380px;
            width: 220px;
            border-radius: 18px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .wiget-type-2:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow:
                0 25px 60px rgba(0, 0, 0, 0.6),
                -3px 0 20px rgba(255, 255, 255, 0.25),
                3px 0 20px rgba(255, 255, 255, 0.25),
                0 0 40px rgba(255, 255, 255, 0.08);
        }

        .wiget-type-2::after {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 55%;
            height: 100%;
            background: linear-gradient(105deg,
                    transparent 20%,
                    rgba(255, 255, 255, 0.06) 40%,
                    rgba(255, 255, 255, 0.12) 50%,
                    rgba(255, 255, 255, 0.06) 60%,
                    transparent 80%);
            transform: skewX(-10deg);
            transition: left 0.7s ease;
            z-index: 6;
            pointer-events: none;
        }

        .wiget-type-2:hover::after {
            left: 160%;
        }

        .wiget-type-2::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0);
            transition: border-color 0.4s ease;
            z-index: 7;
            pointer-events: none;
        }

        .wiget-type-2:hover::before {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .poster-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease, filter 0.4s ease;
            filter: brightness(0.85);
        }

        .wiget-type-2:hover .poster-img {
            transform: scale(1.08);
            filter: brightness(1.05);
        }

        .poster-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(238, 9, 121, 0.95);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            z-index: 5;
            box-shadow: 0 0 12px rgba(238, 9, 121, 0.5);
        }

        .poster-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top,
                    rgba(8, 0, 25, 0.98) 0%,
                    rgba(8, 0, 25, 0.85) 50%,
                    rgba(8, 0, 25, 0.3) 80%,
                    transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 16px;
            transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5;
        }

        .wiget-type-2:hover .poster-overlay {
            height: 75%;
        }

        .poster-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
            transition: transform 0.4s ease;
            transform: translateY(4px);
        }

        .wiget-type-2:hover .poster-info {
            transform: translateY(0);
        }

        .poster-info h3 {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.4rem;
            letter-spacing: 2px;
            color: white;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            line-height: 1;
        }

        .stars {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stars span {
            color: #ffd700;
            font-size: 0.78rem;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.7);
            letter-spacing: 1px;
        }

        .rating-num {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.8rem;
            font-weight: 700;
            margin-left: 2px;
        }

        .poster-info p {
            font-size: 0.76rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.75);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.3s ease;
        }

        .wiget-type-2:hover .poster-info p {
            color: rgba(255, 255, 255, 0.95);
        }

        .poster-info p i {
            color: #ee0979;
            width: 13px;
            font-size: 0.72rem;
        }

        /* ========================
   DOWNLOAD BUTTON
======================== */
        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            margin-top: 8px;
            padding: 8px 0;
            width: 100%;
            background: linear-gradient(135deg, #ee0979, #7b2ff7);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 700;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(238, 9, 121, 0.4);
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
        }

        .download-btn:hover {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            box-shadow: 0 6px 25px rgba(255, 65, 108, 0.7);
            transform: scale(1.03);
            animation: none;
        }

        .download-btn:active {
            transform: scale(0.97);
        }

        .download-btn.downloading {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            animation: none;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 65, 108, 0.6);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(255, 65, 108, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 65, 108, 0);
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="index.html" class="logo"><i class="fa-solid fa-biohazard"></i>AniFlow</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="About us.html">About</a></li>
            <li><a href="contact us.html">Contact</a></li>
        </ul>
    </nav>

    <!-- HERO BANNER -->
    <div class="hero-banner">
        <img id="detailBanner"
            src="https://i0.wp.com/www.adorebooks.in/wp-content/uploads/2023/12/To-Me-The-One-Who-Loved-You-Yomoji-Otone.jpg?fit=1080%2C1080&ssl=1"

            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <!-- LEFT -->
        <div class="left-side">

            <a href="index.html">
                <button class="back-btn" onclick="history.back()">
                    <i class="fa-solid fa-arrow-left"></i> Back
                </button>
            </a>

            <!-- STATS -->
            <div class="stats-bar">
                <div class="stat-item">
                    <i class="fa-solid fa-star"></i>
                    <span id="detailRating"></span>
                </div>

                    <i class="fa-solid fa-calendar-days"></i>

                </div>
                <div class="stat-item">
                    <i class="fa-solid fa-hourglass-start"></i>
                    <span id="detailDuration"></span>
                </div>
                <div class="stat-item">
                    <i class="fa-solid fa-film"></i>
                    <span id="detailQuality"></span>
                </div>
            </div>

            <!-- DESCRIPTION -->
            <div class="desc-card">
                <h2><i class="fa-solid fa-book-open"></i> Description</h2>
                <p id="detailDesc"></p>
            </div>

            <!-- PARTS POSTER CARDS -->
            <div class="cono-2">
                <div class="wiget-type-2" onclick="openModal(10)">
                    <img class="poster-img"
                        src="https://i0.wp.com/www.adorebooks.in/wp-content/uploads/2023/12/To-Me-The-One-Who-Loved-You-Yomoji-Otone.jpg?fit=1080%2C1080&ssl=1"
                        alt="">
                    <div class="poster-badge">720P</div>
                    <div class="poster-overlay">
                        <div class="poster-info">
                            <h3>To Me, The One Who Loved You part (1)</h3>

    <script src="script.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const index = parseInt(params.get('id')) || 10;
        const anime = animeData[index];

        // Fill basic data
        document.getElementById('detailBanner').src = anime.img;
        document.getElementById('detailTitle').innerText = anime.title;
        document.getElementById('detailTitle2').innerText = anime.title;
        document.getElementById('detailBadge').innerText = anime.badge;
        document.getElementById('detailGenre').innerText = anime.genre;
        document.getElementById('detailRating').innerText = anime.rating;
        document.getElementById('detailRating2').innerText = anime.rating;
        document.getElementById('detailDate').innerText = anime.date;
        document.getElementById('detailDuration').innerText = anime.duration;
        document.getElementById('detailQuality').innerText = anime.quality;
        document.getElementById('detailDesc').innerText = anime.desc;
        document.getElementById('detailPoster').src = anime.img;

        // Stars
        const rating = parseFloat(anime.rating);
        const stars = Math.round(rating / 2);
        document.getElementById('detailStars').innerText = '★'.repeat(stars) + '☆'.repeat(5 - stars);

        // LEFT - Poster style parts cards
        const partsPostGrid = document.getElementById('partsPostGrid');
        if (anime.parts && anime.parts.length > 0) {
            anime.parts.forEach((part) => {
                const partRating = parseFloat(part.rating || '0');
                const partStars = Math.round(partRating / 2);

                const card = document.createElement('a');
                card.href = part.link;
                card.target = '_blank';
                card.className = 'part-poster-card';
                card.innerHTML = `
                    <img class="part-poster-img" src="${part.img || anime.img}" alt="${part.label}">
                    <div class="part-poster-badge">${part.quality || anime.quality}</div>
                    <div class="part-poster-overlay">
                        <div class="part-poster-info">
                            <h3>${part.label}</h3>
                            <div class="part-poster-stars">
                                <span class="s">${'★'.repeat(partStars)}${'☆'.repeat(5 - partStars)}</span>
                                <span class="n">${part.rating || anime.rating}</span>
                            </div>
                            <p><i class="fa-solid fa-clapperboard"></i>${part.genre || anime.genre}</p>
                            <p><i class="fa-solid fa-hourglass-start"></i>${part.duration || anime.duration}</p>
                        </div>
                    </div>
                `;
                partsPostGrid.appendChild(card);
            });
        } else {
            // 3 blank placeholder cards
            for (let i = 0; i < 3; i++) {
                const card = document.createElement('div');
                card.className = 'part-poster-card blank';
                card.innerHTML = `
                    <div class="blank-bg">
                        <i class="fa-solid fa-clock"></i>
                        <span>Coming Soon</span>
                    </div>
                    <div class="part-poster-badge">- - -</div>
                    <div class="part-poster-overlay">
                        <div class="part-poster-info">
                            <h3>Coming Soon</h3>
                            <p><i class="fa-solid fa-hourglass-start"></i> Stay tuned</p>
                        </div>
                    </div>
                `;
                partsPostGrid.appendChild(card);
            }
        }

        // RIGHT - Parts buttons / single download
        if (anime.parts && anime.parts.length > 0) {
            document.getElementById('singleSection').style.display = 'none';
            const grid = document.getElementById('partsGrid');
            anime.parts.forEach((part) => {
                const btn = document.createElement('a');
                btn.href = part.link;
                btn.target = '_blank';
                btn.className = 'part-btn';
                btn.innerHTML = `
                    <span><i class="fa-solid fa-download"></i> ${part.label}</span>
                    <i class="fa-solid fa-arrow-right"></i>
                `;
                grid.appendChild(btn);
            });
        } else {
            document.getElementById('partsSection').style.display = 'none';
            document.getElementById('singleDownloadBtn').href = anime.link;
        }
    </script>
